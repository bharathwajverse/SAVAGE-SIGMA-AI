<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savage Sigma AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #020617);
        }
        .header-title {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.6), 0 0 20px rgba(168, 85, 247, 0.4);
        }
        .mono-font {
            font-family: 'Share Tech Mono', monospace;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(168, 85, 247, 0.6);
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg-animate {
            animation: slideIn 0.3s ease-out forwards;
        }
        /* Markdown rendering styles */
        #chatBox ul {
            list-style-type: disc !important;
            margin-left: 1.5rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }
        #chatBox ol {
            list-style-type: decimal !important;
            margin-left: 1.5rem !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }
        #chatBox li {
            margin-bottom: 0.25rem !important;
        }
        #chatBox a {
            color: #f472b6 !important;
            text-decoration: underline !important;
        }
        #chatBox a:hover {
            color: #f43f5e !important;
        }
        #chatBox p {
            margin-bottom: 0.5rem !important;
        }
        #chatBox code {
            background-color: rgba(168, 85, 247, 0.15) !important;
            padding: 0.125rem 0.25rem !important;
            border-radius: 0.25rem !important;
            font-family: monospace !important;
            font-size: 0.875rem !important;
        }
        #chatBox pre {
            background-color: #0f172a !important;
            border: 1px solid rgba(168, 85, 247, 0.2) !important;
            padding: 0.75rem !important;
            border-radius: 0.5rem !important;
            overflow-x: auto !important;
            margin-top: 0.5rem !important;
            margin-bottom: 0.5rem !important;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl glass-panel rounded-2xl flex flex-col h-[85vh] overflow-hidden border border-purple-500/20">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-purple-500/10 flex items-center justify-between bg-slate-950/40">
            <div class="flex items-center space-x-3">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </div>
                <h1 class="header-title text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-500 to-red-500 tracking-wider">
                    SAVAGE SIGMA AI
                </h1>
            </div>
            <span class="mono-font text-xs text-purple-400/80 bg-purple-950/30 border border-purple-500/20 px-2 py-1 rounded">
                v1.2.0-secure
            </span>
        </div>

        <!-- Chat Container -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-950/20">
            <!-- Messages will be injected here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typingIndicator" class="hidden px-6 py-2 bg-slate-950/10 flex items-center space-x-2 text-purple-400/70 text-sm mono-font">
            <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></span>
            <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
            <span class="w-2 h-2 bg-purple-500 rounded-full animate-bounce" style="animation-delay: 0.3s"></span>
            <span>Sigma is thinking...</span>
        </div>

        <!-- Input Form -->
        <form id="chatForm" class="p-4 border-t border-purple-500/10 bg-slate-950/40 flex items-center space-x-3">
            <input 
                type="text" 
                id="messageInput" 
                class="flex-1 bg-slate-900/60 border border-purple-500/30 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition duration-250 placeholder-gray-500"
                placeholder="Talk to Sigma... if you dare."
                required
                autocomplete="off"
            />
            <button 
                type="submit"
                class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 active:scale-95 text-white font-semibold rounded-xl px-6 py-3 shadow-lg shadow-purple-500/20 hover:shadow-purple-500/40 transition duration-200"
            >
                Send
            </button>
        </form>

    </div>

<script>
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const chatBox = document.getElementById("chatBox");
    const typingIndicator = document.getElementById("typingIndicator");

    // Initialize markdown parser options
    marked.setOptions({
        breaks: true,
        gfm: true
    });

    // Helper to get/set sessionId
    function getSessionId() {
        return localStorage.getItem("sigma_session_id");
    }

    function setSessionId(id) {
        localStorage.setItem("sigma_session_id", id);
    }

    function clearSessionId() {
        localStorage.removeItem("sigma_session_id");
    }

    function appendMessage(sender, text, isMarkdown = false) {
        const isUser = sender === "You";
        
        const messageDiv = document.createElement("div");
        messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} msg-animate`;

        const bubbleContainer = document.createElement("div");
        bubbleContainer.className = `max-w-[80%] rounded-2xl px-4 py-3 shadow-md ${
            isUser 
                ? 'bg-gradient-to-br from-purple-600 to-indigo-700 text-white rounded-br-none' 
                : 'bg-slate-900 border border-purple-500/20 text-gray-200 rounded-bl-none'
        }`;

        const senderLabel = document.createElement("div");
        senderLabel.className = `text-xs font-semibold mb-1 ${isUser ? 'text-purple-200' : 'text-pink-400 mono-font'}`;
        senderLabel.innerText = isUser ? "YOU" : "SIGMA AI";
        bubbleContainer.appendChild(senderLabel);

        const contentDiv = document.createElement("div");
        contentDiv.className = "text-sm leading-relaxed prose prose-invert max-w-none";
        
        if (isMarkdown && !isUser) {
            contentDiv.innerHTML = marked.parse(text);
        } else {
            contentDiv.innerText = text;
        }
        bubbleContainer.appendChild(contentDiv);
        messageDiv.appendChild(bubbleContainer);
        chatBox.appendChild(messageDiv);
        
        // Auto-scroll
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    chatForm.addEventListener("submit", function(event) {
        event.preventDefault();  
        const message = messageInput.value.trim();
        if (!message) return;

        appendMessage("You", message);
        messageInput.value = "";

        // Show typing indicator
        typingIndicator.classList.remove("hidden");
        chatBox.scrollTop = chatBox.scrollHeight;

        const requestBody = {
            message: message,
            sessionId: getSessionId()
        };

        fetch(`${window.location.origin}/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(requestBody)
        })
        .then(response => {
            if (!response.ok) {
                throw new Error("Server error or unreachable");
            }
            return response.json();
        })
        .then(data => {
            typingIndicator.classList.add("hidden");

            if (data.sessionId) {
                setSessionId(data.sessionId);
            }

            // Handle "exit" signal
            if (message.toLowerCase() === "exit") {
                clearSessionId();
            }

            appendMessage("Sigma", data.reply, true);
        })
        .catch(err => {
            typingIndicator.classList.add("hidden");
            appendMessage("Sigma", `*Error establishing handshake:* Failed to connect to server backend. (${err.message})`, true);
        });
    });
</script>

</body>
</html>
